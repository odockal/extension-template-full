name: pr-check

on: [pull_request]

jobs:
  lint-format-unit:
    name: linter, formatter, and tests / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'

      - name: Execute npm
        run: npm install

      - name: Run linter
        run: npm run lint:check

        # skip formatter on windows
      - name: Run formatter
        if: ${{ matrix.os=='ubuntu-24.04' }}
        run: npm run format:check

      - name: Run tests
        run: npm run test

      - name: Run typecheck
        run: npm run typecheck

      - name: Run build
        run: npm run build

  # Dedicated step to build the chaos lab extension image
  build-container:
    name: Build Extension Image
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build Image and Extract Files
        id: build-image
        run: |
          podman build -t local_image ./
          CONTAINER_ID=$(podman create localhost/local_image --entrypoint "")
          mkdir -p output/plugins
          podman export $CONTAINER_ID | tar -x -C output/plugins/
          podman rm -f $CONTAINER_ID
          podman rmi -f localhost/local_image:latest

      - name: Upload Chaos Lab Image Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: chaoslab-plugin
          path: output/plugins/

  e2e-tests:
    name: e2e require_tests
    needs: build-container
    runs-on: ubuntu-24.04
    env:
      SKIP_INSTALLATION: true
    steps:
      - uses: actions/checkout@v6
        with:
          path: extension-template-full
      - uses: actions/setup-node@v6
        with:
          node-version: 24

      # Checkout podman desktop
      - uses: actions/checkout@v6
        with:
          repository: podman-desktop/podman-desktop
          ref: main
          path: podman-desktop

      - name: Revert unprivileged user namespace restrictions in Ubuntu 24.04
        run: |
          # allow unprivileged user namespace
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0

      - uses: pnpm/action-setup@v5
        name: Install pnpm
        with:
          run_install: false
          package_json_file: ./podman-desktop/package.json

      - name: Execute pnpm
        working-directory: ./podman-desktop
        run: pnpm install

      - name: Build Podman Desktop for E2E tests
        working-directory: ./podman-desktop
        run: pnpm test:e2e:build

      - name: Ensure getting current HEAD version of the test framework
        working-directory: ./extension-template-full/tests/playwright
        run: |
          # workaround for https://github.com/podman-desktop/extension-bootc/issues/712
          version=$(npm view @podman-desktop/tests-playwright@next version)
          echo "Version of @podman-desktop/tests-playwright to be used: $version"
          jq --arg version "$version" '.devDependencies."@podman-desktop/tests-playwright" = $version' package.json > package.json_tmp && mv package.json_tmp package.json

      # Install the chaoslab extension
      - name: Download chaoslab Plugins
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: chaoslab-plugin
          path: extension-template-full/tests/playwright/tests/playwright/output/pd-extension-chaoslab-tests/plugins/

      - name: Execute npm in Extension folder
        working-directory: ./extension-template-full
        run: npm install

      - name: Run All E2E tests
        working-directory: ./extension-template-full
        env:
          PODMAN_DESKTOP_ARGS: ${{ github.workspace }}/podman-desktop
        run: npm run test:e2e

      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v6
        if: always() # always run even if the previous step fails
        with:
          annotate_only: true
          fail_on_failure: true
          include_passed: true
          detailed_summary: true
          require_tests: true
          report_paths: '**/*results.xml'

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: e2e-tests
          path: ./**/tests/**/output/
